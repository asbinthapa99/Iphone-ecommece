<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#060d0a" />
    <title>Offline | Inexa Nepal</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at 20% 20%, #13231d, #060d0a 55%);
        color: #f3f7f5;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(520px, 100%);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 18px;
        padding: 28px;
        box-sizing: border-box;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1.1;
      }
      p {
        margin: 0 0 18px;
        color: rgba(243, 247, 245, 0.86);
        line-height: 1.55;
      }
      a {
        display: inline-block;
        text-decoration: none;
        color: #060d0a;
        background: #ffffff;
        border-radius: 12px;
        font-weight: 700;
        padding: 12px 16px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>
        Inexa Nepal could not load this page right now. Once your internet is back,
        you can continue browsing phones and gadgets.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
